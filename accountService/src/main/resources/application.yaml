spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/t1_demo
    username: postgres
    password: postgres
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    properties:
      hibernate:
        format_sql: true
logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
metric:
  time-limit: 70ms
cache:
  ttl: 30m
  max-size: 1000